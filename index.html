<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione um perfil para iniciar a sessão na página estilo Netflix">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
    </header>

    <main>
        <section aria-labelledby="profiles-title">
            <h2 id="profiles-title" class="visually-hidden">Perfis de usuário</h2>
            <div class="profiles">
                <figure class="profile">
                    <img src="/assets/cffa6f80921f68f97921681755a2156f.jpg" alt="Avatar do perfil 1" loading="lazy">
                    <figcaption>Perfil 1</figcaption>
                </figure>

                <figure class="profile">
                    <img src="assets/L u c y.jpg" alt="Avatar do perfil 2" loading="lazy">
                    <figcaption>Perfil 2</figcaption>
                </figure>

                <figure class="profile">
                    <img src="assets/power icon.jpg" alt="Avatar do perfil 3" loading="lazy">
                    <figcaption>Perfil 3</figcaption>
                </figure>
            </div>
        </section>
    </main>
</body>
</html>
