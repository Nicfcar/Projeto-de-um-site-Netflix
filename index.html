<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione um perfil para iniciar a sessão na página estilo Netflix">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
    </header>

    <main>
        <section aria-labelledby="profiles-title">
            <h2 id="profiles-title" class="visually-hidden">Perfis de usuário</h2>
            <div class="profiles">
                <figure class="profile" onclick="selectProfile('Perfil 1', 'assets/cffa6f80921f68f97921681755a2156f.jpg')">
                    <img src="assets/cffa6f80921f68f97921681755a2156f.jpg" alt="Avatar do perfil 1" class="profile__image" loading="lazy">
                    <figcaption class="profile__name">Perfil 1</figcaption>
                </figure>

                <figure class="profile" onclick="selectProfile('Perfil 2', 'assets/L u c y.jpg')">
                    <img src="assets/L u c y.jpg" alt="Avatar do perfil 2" class="profile__image" loading="lazy">
                    <figcaption class="profile__name">Perfil 2</figcaption>
                </figure>

                <figure class="profile" onclick="selectProfile('Perfil 3', 'assets/power icon.jpg')">
                    <img src="assets/power icon.jpg" alt="Avatar do perfil 3" class="profile__image" loading="lazy">
                    <figcaption class="profile__name">Perfil 3</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <script>
        function selectProfile(profileName, profileImage) {
            localStorage.setItem('selectedProfile', JSON.stringify({
                name: profileName,
                image: profileImage
            }));
            window.location.href = 'catalog.html';
        }
    </script>
</body>
</html>
